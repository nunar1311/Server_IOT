version: "3.8"
services:
  mongodb:
    image: mongo:7
    container_name: ai_guardian_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./init_mongo.js:/docker-entrypoint-initdb.d/init_mongo.js:ro
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ai_guardian_secure_pass_2024
      MONGO_INITDB_DATABASE: ai_guardian
    restart: unless-stopped
    networks:
      - ai_guardian_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: ai_guardian_mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped
    networks:
      - ai_guardian_net
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: MongoDB Express (Web UI for MongoDB)
  mongo-express:
    image: mongo-express:latest
    container_name: ai_guardian_mongo_express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: ai_guardian_secure_pass_2024
      ME_CONFIG_MONGODB_URL: mongodb://admin:ai_guardian_secure_pass_2024@mongodb:27017/
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ai_guardian_net

networks:
  ai_guardian_net:
    driver: bridge

volumes:
  mongo_data:
  mosquitto_data:
  mosquitto_log:
